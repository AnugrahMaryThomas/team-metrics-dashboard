<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Metrics Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Team Metrics Dashboard</h1>
    </header>
    <main>
        <section id="metrics">
            <h2>Current Metrics</h2>
            <div class="metric">
                <h3>Performance</h3>
                <p id="performance-data">Data Loading...</p>
            </div>
            <div class="metric">
                <h3>Attendance</h3>
                <p id="attendance-data">Data Loading...</p>
            </div>
            <div class="metric">
                <h3>Tasks Completed</h3>
                <p id="tasks-data">Data Loading...</p>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Team Metrics. All rights reserved.</p>
    </footer>
</body>
</html>
